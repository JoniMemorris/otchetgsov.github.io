<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Отчетность ГСов — История отчётов</title>
    <!-- CSS Styles embedded for offline iframe rendering and premium design -->
    <style>
        :root {
            --radius-sm: 6px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            --card-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3), 0 4px 6px -4px rgba(0, 0, 0, 0.3);
            --success: #10b981;
            --success-bg: rgba(16, 185, 129, 0.1);
            --danger: #ef4444;
            --danger-bg: rgba(239, 68, 68, 0.1);
            --warning: #f59e0b;
            --info: #0ea5e9;
        }

        /* --- THEME STYLES --- */
        [data-theme="deep-space"] {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-card: #1e293b;
            --border-color: #334155;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --primary-glow: rgba(99, 102, 241, 0.15);
        }
        [data-theme="polar-night"] {
            --bg-primary: #020617;
            --bg-secondary: #0f172a;
            --bg-card: #0f172a;
            --border-color: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --primary: #0ea5e9;
            --primary-hover: #0284c7;
            --primary-glow: rgba(14, 165, 233, 0.15);
        }
        [data-theme="sunset-glow"] {
            --bg-primary: #1c1917;
            --bg-secondary: #292524;
            --bg-card: #292524;
            --border-color: #44403c;
            --text-primary: #fafaf9;
            --text-secondary: #d6d3d1;
            --primary: #f43f5e;
            --primary-hover: #e11d48;
            --primary-glow: rgba(244, 63, 94, 0.15);
        }
        [data-theme="neon-cyber"] {
            --bg-primary: #090514;
            --bg-secondary: #120b24;
            --bg-card: #120b24;
            --border-color: #2e1a4a;
            --text-primary: #fdfaff;
            --text-secondary: #b5a4cf;
            --primary: #d946ef;
            --primary-hover: #c084fc;
            --primary-glow: rgba(217, 70, 239, 0.15);
        }
        [data-theme="pure-light"] {
            --bg-primary: #f8fafc;
            --bg-secondary: #f1f5f9;
            --bg-card: #ffffff;
            --border-color: #e2e8f0;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --primary-glow: rgba(79, 70, 229, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: var(--font-family);
            transition: background-color 0.3s ease, border-color 0.3s ease, color 0.3s ease;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            padding: 2rem 1.5rem;
            min-height: 100vh;
            line-height: 1.5;
        }

        .container {
            max-width: 800px; /* Centered, clean single-column max width */
            margin: 0 auto;
        }

        /* Header Style */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .header-title-container h1 {
            font-size: 2.25rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary) 0%, #a5b4fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
        }

        .header-title-container p {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-top: 0.25rem;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .btn-theme-toggle {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 0.6rem;
            border-radius: 50%;
            cursor: pointer;
            width: 42px;
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            outline: none;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .btn-theme-toggle:hover {
            border-color: var(--primary);
            color: var(--primary);
            transform: scale(1.05);
        }

        /* Navigation Button */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            font-weight: 600;
            font-size: 0.95rem;
            padding: 0.7rem 1.25rem;
            border-radius: var(--radius-md);
            cursor: pointer;
            border: 1px solid transparent;
            transition: all 0.2s ease;
            text-decoration: none;
        }

        .btn-primary {
            background-color: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
        }

        .btn-secondary {
            background-color: var(--bg-secondary);
            border-color: var(--border-color);
            color: var(--text-primary);
        }

        .btn-secondary:hover {
            border-color: var(--text-secondary);
            background-color: rgba(255,255,255,0.02);
            transform: translateY(-1px);
        }

        .btn-danger {
            background-color: var(--danger-bg);
            color: var(--danger);
            border-color: rgba(239, 68, 68, 0.2);
        }

        .btn-danger:hover {
            background-color: var(--danger);
            color: white;
            transform: translateY(-1px);
        }

        .btn-success {
            background-color: var(--success-bg);
            color: var(--success);
            border-color: rgba(16, 185, 129, 0.2);
        }

        .btn-success:hover {
            background-color: var(--success);
            color: white;
            transform: translateY(-1px);
        }

        .btn-sm {
            padding: 0.4rem 0.75rem;
            font-size: 0.85rem;
            border-radius: var(--radius-sm);
        }

        /* Search Input */
        .search-panel {
            margin-bottom: 2rem;
        }

        input[type="text"] {
            width: 100%;
            padding: 0.85rem 1.25rem;
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            color: var(--text-primary);
            font-size: 1rem;
            outline: none;
            box-shadow: var(--card-shadow);
        }

        input[type="text"]:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-glow);
        }

        /* Report Feed Layout */
        .history-feed {
            display: flex;
            flex-direction: column;
            gap: 1.75rem;
        }

        /* Report Card Styling */
        .report-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 1.75rem;
            box-shadow: var(--card-shadow);
            animation: fadeIn 0.3s ease;
        }

        .report-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.25rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.75rem;
        }

        .report-card-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .card-badge {
            font-size: 0.75rem;
            padding: 0.25rem 0.6rem;
            border-radius: 50px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .card-badge.purple {
            background-color: rgba(99, 102, 241, 0.15);
            color: #818cf8;
            border: 1px solid rgba(99, 102, 241, 0.3);
        }

        /* Full report text box */
        .report-text-block {
            background-color: rgba(0,0,0,0.15);
            border: 1px solid var(--border-color);
            border-left: 4px solid var(--primary);
            border-radius: var(--radius-md);
            padding: 1.25rem;
            font-family: monospace;
            font-size: 0.925rem;
            color: #38bdf8;
            max-height: 380px;
            overflow-y: auto;
            margin-bottom: 1.25rem;
            white-space: pre-wrap;
            user-select: all;
        }

        /* Action bar for single card */
        .card-actions {
            display: flex;
            justify-content: flex-end;
            gap: 0.5rem;
            border-top: 1px solid var(--border-color);
            padding-top: 1.25rem;
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 5rem 1rem;
            background-color: var(--bg-card);
            border: 1px dashed var(--border-color);
            border-radius: var(--radius-lg);
            color: var(--text-secondary);
            box-shadow: var(--card-shadow);
        }

        .empty-state svg {
            width: 64px;
            height: 64px;
            stroke: var(--text-muted);
            margin-bottom: 1rem;
        }

        .empty-state h2 {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }

        /* Toast notifications container */
        .toast-container {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            z-index: 1000;
        }

        .toast {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-left: 4px solid var(--primary);
            box-shadow: var(--card-shadow);
            color: var(--text-primary);
            padding: 0.85rem 1.25rem;
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 0.9rem;
            font-weight: 600;
            min-width: 280px;
            animation: slideInRight 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .toast.success { border-left-color: var(--success); }
        .toast.danger { border-left-color: var(--danger); }
        .toast.info { border-left-color: var(--info); }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideInRight {
            from { transform: translateX(120%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .slide-fade-out {
            animation: slideOutRight 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards !important;
        }

        @keyframes slideOutRight {
            from { transform: translateX(0); opacity: 1; }
            to { transform: translateX(120%); opacity: 0; }
        }

        /* Modal Overlay styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1001;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            width: 90%;
            max-width: 480px;
            padding: 1.75rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transform: translateY(20px);
            transition: transform 0.25s ease;
        }

        .modal-overlay.active .modal {
            transform: translateY(0);
        }

        .modal-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 0.75rem;
            color: var(--text-primary);
        }

        .modal-body {
            font-size: 0.95rem;
            color: var(--text-secondary);
            margin-bottom: 1.5rem;
        }

        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 0.75rem;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Header -->
    <header>
        <div class="header-title-container">
            <h1>📂 История отчётов</h1>
            <p>Хронологический архив всех сгенерированных вами отчётов</p>
        </div>
        <div class="header-actions">
            <!-- Go Back to index -->
            <a href="index.html" class="btn btn-secondary">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: middle;"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                Вернуться к Конструктору
            </a>
            <!-- Go to settings -->
            <a href="settings.html" class="btn btn-secondary">
                ⚙️ Настройки
            </a>
            <!-- Theme Toggle -->
            <button class="btn-theme-toggle" id="themeToggleBtn" title="Переключить тему">
                <svg id="themeIcon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></svg>
            </button>
        </div>
    </header>

    <!-- Simple Search Bar -->
    <div class="search-panel">
        <input type="text" id="searchKeyword" placeholder="🔍 Быстрый поиск в истории по дате, описанию или задачам..." oninput="filterAndRender()">
    </div>

    <!-- History feed lists -->
    <div class="history-feed" id="historyFeedContainer">
        <!-- Injected dynamically -->
    </div>
</div>

<!-- Notification Toast Container -->
<div class="toast-container" id="toastContainer"></div>

<!-- Confirmation Delete Modal -->
<div class="modal-overlay" id="confirmDeleteModal">
    <div class="modal">
        <div class="modal-title">Удалить этот отчёт?</div>
        <div class="modal-body">
            Вы уверены, что хотите удалить выбранный отчёт из истории? Это действие необратимо.
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary btn-sm" onclick="hideConfirmDeleteModal()">Отмена</button>
            <button class="btn btn-danger btn-sm" id="confirmDeleteBtn">Да, удалить</button>
        </div>
    </div>
</div>

<script>
    // Local application state synced with main site
    let state = {
        records: [],
        settings: {
            theme: "deep-space"
        }
    };

    let filteredRecords = [];
    let recordToDeleteId = null;

    document.addEventListener("DOMContentLoaded", () => {
        loadFromLocalStorage();
        applyTheme();

        // Attach theme toggler
        document.getElementById("themeToggleBtn").addEventListener("click", toggleTheme);

        filterAndRender();
    });

    function loadFromLocalStorage() {
        try {
            const savedState = localStorage.getItem("reportcraft_state_updated");
            if (savedState) {
                state = JSON.parse(savedState);
            }
        } catch (e) {
            console.error("Ошибка чтения localStorage в Архиве", e);
        }
    }

    function saveToLocalStorage() {
        try {
            localStorage.setItem("reportcraft_state_updated", JSON.stringify(state));
        } catch (e) {
            console.error("Ошибка записи localStorage", e);
        }
    }

    // Real-time synchronization across multiple open tabs/iframes! (THE ULTIMATE SYNC ENGINE)
    window.addEventListener('storage', (e) => {
        if (e.key === 'reportcraft_state_updated') {
            loadFromLocalStorage(); // Read new state from localStorage
            applyTheme(); // Restyle background instantly
            filterAndRender(); // Re-filter and re-render history feed in real-time!
        }
    });

    // Theme logic cycling through 5 themes on click
    function toggleTheme() {
        const themes = ['deep-space', 'polar-night', 'sunset-glow', 'neon-cyber', 'pure-light'];
        let currentIdx = themes.indexOf(state.settings.theme);
        if (currentIdx === -1) currentIdx = 0;
        
        const nextIdx = (currentIdx + 1) % themes.length;
        state.settings.theme = themes[nextIdx];
        
        saveToLocalStorage();
        applyTheme();
        
        const names = {
            'deep-space': 'Глубокий Космос',
            'polar-night': 'Полярная Ночь',
            'sunset-glow': 'Теплый Закат',
            'neon-cyber': 'Киберпанк',
            'pure-light': 'Чистый Лист'
        };
        showToast(`Тема: ${names[state.settings.theme]}`, "info");
    }

    function applyTheme() {
        const root = document.documentElement;
        if (!state.settings || !state.settings.theme) {
            state.settings = { theme: "deep-space" };
        }
        root.setAttribute("data-theme", state.settings.theme);

        const themeIcon = document.getElementById("themeIcon");
        if (state.settings.theme === "pure-light") {
            themeIcon.innerHTML = `<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>`;
        } else {
            themeIcon.innerHTML = `
                <circle cx="12" cy="12" r="5"></circle>
                <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"></path>
            `;
        }
    }

    // Filter Logic Engine
    function filterAndRender() {
        const keyword = document.getElementById("searchKeyword").value.toLowerCase();

        filteredRecords = state.records.filter(r => {
            const inDesc = r.description.toLowerCase().includes(keyword);
            const inDate = r.date.includes(keyword) || (r.startDate && r.startDate.includes(keyword));
            const inChecklist = r.checklist && r.checklist.some(t => t.text.toLowerCase().includes(keyword));
            
            // Generate full text in memory to search inside compiled templates too!
            const fullCompiledText = compileReportText(r.startDate, r.endDate, r.date, r.youtubeUrl, r.description, r.checklist).toLowerCase();
            const inCompiled = fullCompiledText.includes(keyword);

            return inDesc || inDate || inChecklist || inCompiled;
        });

        renderHistoryFeed();
    }

    // Render Clean History Feed
    function renderHistoryFeed() {
        const container = document.getElementById("historyFeedContainer");
        container.innerHTML = "";

        if (filteredRecords.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <svg fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
                    </svg>
                    <h2>История отчётов пуста</h2>
                    <p>Вы ещё не сохранили ни одного отчёта, либо фильтры поиска не дали результатов.</p>
                </div>
            `;
            return;
        }

        filteredRecords.forEach(r => {
            const formattedStart = r.startDate ? r.startDate.split('-').reverse().join('.') : "__.__.____";
            const formattedEnd = r.endDate ? r.endDate.split('-').reverse().join('.') : "__.__.____";
            const formattedReport = r.date ? r.date.split('-').reverse().join('.') : "__.__.____";

            const reportText = compileReportText(r.startDate, r.endDate, r.date, r.youtubeUrl, r.description, r.checklist);

            const card = document.createElement("div");
            card.className = "report-card";

            card.innerHTML = `
                <div class="report-card-header">
                    <div class="report-card-title">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: middle;"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                        Отчёт за период: С ${formattedStart} по ${formattedEnd}
                    </div>
                    <span class="card-badge purple">
                        📅 Создан: ${formattedReport}
                    </span>
                </div>

                <!-- Live Monospace compiled report text block -->
                <div class="report-text-block">${reportText}</div>

                <!-- Bottom operations for single card -->
                <div class="card-actions">
                    <button class="btn btn-secondary btn-sm" onclick="copySingleReport(\`${escapeBackticks(reportText)}\`)">
                        📋 Скопировать отчёт
                    </button>
                    <button class="btn btn-secondary btn-sm" onclick="downloadSingleReport('${r.date}', \`${escapeBackticks(reportText)}\`)">
                        💾 Скачать .txt
                    </button>
                    <a href="index.html?edit=${r.id}" class="btn btn-success btn-sm">
                        ✏️ Доработать в Конструкторе
                    </a>
                    <button class="btn btn-danger btn-sm" onclick="showConfirmDeleteModal('${r.id}')">
                        🗑️ Удалить
                    </button>
                </div>
            `;
            container.appendChild(card);
        });
    }

    // Compile report text matching the format exactly
    function compileReportText(startDate, endDate, reportDate, youtube, description, checklist) {
        const formattedStart = startDate ? startDate.split('-').reverse().join('.') : "__.__.____";
        const formattedEnd = endDate ? endDate.split('-').reverse().join('.') : "__.__.____";
        const formattedReport = reportDate ? reportDate.split('-').reverse().join('.') : "__.__.____";

        let report = `📝 ОТЧЁТ О ВЫПОЛНЕННОЙ РАБОТЕ\n\n`;
        report += `С ${formattedStart} по ${formattedEnd}\n\n`;
        report += `━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n`;
        report += `📅 Дата: ${formattedReport}\n\n`;
        report += `🎥 ВИДЕО ДЕМОНСТРАЦИЯ:\n`;
        report += `🔗 ${youtube ? youtube : ""}\n\n\n\n`;
        report += `🛠️ ОПИСАНИЕ ВЫПОЛНЕННЫХ ЗАДАЧ:\n`;
        report += `${description}\n`;

        if (checklist && checklist.length > 0) {
            report += `\n📋 СТАТУС ВЫПОЛНЕНИЯ ПОДЗАДАЧ:\n`;
            checklist.forEach(item => {
                const statusBox = item.completed ? "[x]" : "[ ]";
                report += `${statusBox} ${item.text}\n`;
            });
        }

        return report;
    }

    // Action functions
    function copySingleReport(text) {
        navigator.clipboard.writeText(text).then(() => {
            showToast("Отчёт скопирован в буфер обмена!", "success");
        }).catch(() => {
            showToast("Не удалось скопировать", "danger");
        });
    }

    function downloadSingleReport(date, text) {
        const dataStr = "data:text/plain;charset=utf-8," + encodeURIComponent(text);
        const anchor = document.createElement('a');
        anchor.setAttribute("href", dataStr);
        anchor.setAttribute("download", `report_${date}.txt`);
        document.body.appendChild(anchor);
        anchor.click();
        anchor.remove();
        showToast("Отчёт сохранен как файл .txt", "success");
    }

    function showConfirmDeleteModal(id) {
        recordToDeleteId = id;
        document.getElementById("confirmDeleteModal").classList.add("active");
    }

    function hideConfirmDeleteModal() {
        document.getElementById("confirmDeleteModal").classList.remove("active");
        recordToDeleteId = null;
    }

    // Modal confirmation execution trigger
    document.getElementById("confirmDeleteBtn").onclick = function() {
        if (recordToDeleteId) {
            state.records = state.records.filter(r => r.id !== recordToDeleteId);
            saveToLocalStorage();
            hideConfirmDeleteModal();
            filterAndRender();
            showToast("Отчёт успешно удален из архива", "danger");
        }
    };

    // Notifications Toast helper
    function showToast(message, type = "success") {
        const container = document.getElementById("toastContainer");
        const toast = document.createElement("div");
        toast.className = `toast ${type}`;
        
        let icon = "";
        if (type === "success") {
            icon = `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" stroke="var(--success)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>`;
        } else if (type === "danger") {
            icon = `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" stroke="var(--danger)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>`;
        } else {
            icon = `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" stroke="var(--info)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>`;
        }

        toast.innerHTML = `${icon} <span>${message}</span>`;
        container.appendChild(toast);

        setTimeout(() => {
            toast.classList.add("slide-fade-out");
            toast.addEventListener("animationend", () => {
                toast.remove();
            });
        }, 3000);
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#039;");
    }

    // Escape backticks for JS injection template strings
    function escapeBackticks(str) {
        if (!str) return '';
        return str.replace(/`/g, '\\`').replace(/\$/g, '\\$');
    }
</script>
</body>
